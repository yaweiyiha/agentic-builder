apiVersion: apps/v1
kind: Deployment
metadata:
  name: apollo-gateway
  namespace: default
  labels:
    app: gateway
    tier: edge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: gateway
        tier: edge
    spec:
      containers:
        - name: apollo-router
          image: ghcr.io/apollographql/router:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: APOLLO_ROUTER_SUPERGRAPH_PATH
              value: "/dist/supergraph.graphql"
            - name: CATALOG_URL
              value: "http://catalog-pim-service.default.svc.cluster.local:80/graphql"
            - name: CART_URL
              value: "http://cart-checkout-service.default.svc.cluster.local:80/graphql"
            - name: OMS_URL
              value: "http://oms-service.default.svc.cluster.local:80/graphql"
          volumeMounts:
            - name: router-config
              mountPath: /dist/router.yaml
              subPath: router.yaml
            - name: supergraph-schema
              mountPath: /dist/supergraph.graphql
              subPath: supergraph.graphql
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: router-config
          configMap:
            name: gateway-config
        - name: supergraph-schema
          configMap:
            name: gateway-schema
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: default
  labels:
    app: gateway
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 4000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: apollo-gateway
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
